baseURL = "https://vanuita.fr/"
languageCode = "fr-fr"
title = "Vanuita — Bien-être & Équilibre"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true

[params]
  description = "Conseils bien-être, méditation, sommeil et équilibre de vie pour prendre soin de vous au quotidien."
  author = "Admin"
  DateFormat = "2 January 2006"
  defaultTheme = "light"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowToc = true

[params.homeInfoParams]
  Title = "Bienvenue sur Vanuita"
  Content = "Des conseils pratiques pour prendre soin de votre bien-être, améliorer votre sommeil et retrouver l'équilibre au quotidien."

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[taxonomies]
  category = "categories"
  tag = "tags"

[menu]
  [[menu.main]]
    identifier = "accueil"
    name = "Accueil"
    url = "/"
    weight = 1
  [[menu.main]]
    identifier = "articles"
    name = "Articles"
    url = "/posts/"
    weight = 2
