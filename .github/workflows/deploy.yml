name: Deploy Hugo PBN

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────
  # ÉTAPE 1 : BUILD
  # ─────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hugo-public
          path: ./public

  # ─────────────────────────────────────────
  # ÉTAPE 2A : DEPLOY → GITHUB PAGES
  # ─────────────────────────────────────────
  deploy-github-pages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: hugo-public
          path: ./public

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

  # ─────────────────────────────────────────
  # ÉTAPE 2B : DEPLOY → VERCEL
  # ─────────────────────────────────────────
  deploy-vercel:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: hugo-public
          path: ./public

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel deploy ./public --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ─────────────────────────────────────────
  # ÉTAPE 2C : DEPLOY → CLOUDFLARE PAGES
  # ─────────────────────────────────────────
  deploy-cloudflare:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: hugo-public
          path: ./public

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
          directory: ./public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────
  # ÉTAPE 3 : PING GOOGLE (SEO)
  # ─────────────────────────────────────────
  ping-google:
    needs: [deploy-github-pages, deploy-vercel, deploy-cloudflare]
    runs-on: ubuntu-latest
    continue-on-error: true
    if: ${{ secrets.CUSTOM_DOMAIN != '' }}
    steps:
      - name: Ping Google sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://${{ secrets.CUSTOM_DOMAIN }}/sitemap.xml"
          echo "Sitemap soumis à Google : https://${{ secrets.CUSTOM_DOMAIN }}/sitemap.xml"
