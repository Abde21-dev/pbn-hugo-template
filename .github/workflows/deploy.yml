name: Deploy Hugo PBN

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────
  # ÉTAPE 1 : BUILD
  # ─────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hugo-public
          path: ./public

  # ─────────────────────────────────────────
  # ÉTAPE 2 : DEPLOY → GITHUB PAGES
  # ─────────────────────────────────────────
  deploy-github-pages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: hugo-public
          path: ./public

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

  # ─────────────────────────────────────────
  # ÉTAPE 3 : PING GOOGLE (SEO)
  # ─────────────────────────────────────────
  ping-google:
    needs: deploy-github-pages
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Ping Google sitemap
        env:
          CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}
        run: |
          if [ -n "$CUSTOM_DOMAIN" ]; then
            curl -s "https://www.google.com/ping?sitemap=https://$CUSTOM_DOMAIN/sitemap.xml"
            echo "Sitemap soumis à Google : https://$CUSTOM_DOMAIN/sitemap.xml"
          else
            echo "Pas de domaine custom configuré, ping ignoré."
          fi
